<p>
    
    get-data-from-api works!
    
</p>
<button>Get Data From API </button>

<button (click)="onFetchData()">Fetch Data from API</button>

<hr/>
@if (apiData()) {
    <div style="margin-top: 20px; padding: 10px; background: #e0f7fa; border-radius: 4px;">
      <h3>Response Data:</h3>
      <p><strong>Message:</strong> {{ apiData()?.message }}</p>
      <p><strong>Key:</strong> {{ apiData()?.key }}</p>
      <p><strong>Key 2:</strong> {{ apiData()?.key2 }}</p>
    </div>
  }

  @if (errorMessage()) {
    <div style="margin-top: 20px; padding: 10px; background: #ffebee; color: #c62828; border-radius: 4px;">
      {{ errorMessage() }}
    </div>
  }
