        const myFun = async () => {
            try {
                const response = await fetch("https://localhost:6004/v4Get"
                    //, { credentials: "include" }
                );

                // 1. Await the JSON conversion
                let data = await response.json();  //JSON - JavaScript Object Notation

                // 2. Format the JSON object into a readable string
                // data = JSON.stringify(data, null, 2);
                data = `<b style="color:red;"> Messagggggge ${data.message} </b> <p> Key ===== ${data.key}  </p>`;
                // ` backtick

                // const formattedData = `<p> ${ data.message}  </p>`;
                let formattedData = data;
                // 3. Target the ID with quotes and wrap in <pre> tags to keep formatting
                document.getElementById("apiData").innerHTML = `<pre>${formattedData}</pre>`;

            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById("apiData").innerText = "Failed to load data.";
            }
        }
    </script>
</head>

<body>
    <button onclick=myFun()> Get Data from API </button>

    <div id="apiData"></div>
</body>
